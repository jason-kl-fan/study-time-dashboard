<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>時光小站｜前台輸入</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="decor decor-1"></div>
      <div class="decor decor-2"></div>
      <div class="decor decor-3"></div>

      <header class="hero compact-hero">
        <div>
          <p class="eyebrow">Frontend • Input • Personal Stats</p>
          <h1>時光小站｜前台</h1>
          <p class="hero-text">提供使用者記錄時間，並即時看到每位人員自己的時間分配圖。</p>
        </div>
        <div class="hero-card">
          <div class="hero-badge">✨ 前台輸入頁</div>
          <p>這裡只保留輸入與基礎統計，完整管理請到後台頁。</p>
          <a class="link-btn" href="admin.html">前往後台管理</a>
        </div>
      </header>

      <main class="frontend-layout">
        <section class="panel input-panel">
          <div class="panel-title-row">
            <div>
              <p class="panel-kicker">時間輸入</p>
              <h2>開始 / 結束紀錄</h2>
            </div>
            <span class="live-clock" id="liveClock"></span>
          </div>

          <div class="form-grid">
            <label>
              <span>姓名</span>
              <select id="personSelect"></select>
            </label>
            <label>
              <span>項目</span>
              <select id="categorySelect"></select>
            </label>
          </div>

          <div class="action-buttons">
            <button id="startBtn" class="primary-btn">開始計時</button>
            <button id="endBtn" class="secondary-btn">結束計時</button>
          </div>

          <div class="status-card" id="currentStatus">目前沒有進行中的紀錄。</div>

          <div class="today-list-wrap">
            <div class="subsection-title-row">
              <h3>今天的紀錄</h3>
            </div>
            <div id="todayRecords" class="record-list empty-state">目前還沒有紀錄，先按下開始計時吧。</div>
          </div>
        </section>

        <section class="panel stats-panel">
          <div class="panel-title-row">
            <div>
              <p class="panel-kicker">前台統計</p>
              <h2>時間分配總覽</h2>
            </div>
          </div>

          <div class="filter-bar two-col-tight">
            <label>
              <span>統計區間</span>
              <select id="rangeSelect">
                <option value="day">每日</option>
                <option value="week">每週</option>
                <option value="month">每月</option>
              </select>
            </label>
            <label>
              <span>總覽人員</span>
              <select id="overviewPersonSelect"></select>
            </label>
          </div>

          <div class="summary-cards" id="summaryCards"></div>

          <div class="chart-card mt-18">
            <h3>整體比較</h3>
            <canvas id="overviewBarChart"></canvas>
          </div>

          <div class="person-chart-section">
            <div class="subsection-title-row">
              <h3>各人時間分配圖</h3>
              <span class="table-tip">每個人都會有自己一張圖</span>
            </div>
            <div id="personChartsGrid" class="person-charts-grid"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
    <script src="frontend.js"></script>
  </body>
</html>
